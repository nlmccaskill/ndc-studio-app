<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NDC Studio Check-In</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0b1a33;
  color: white;
}

.header {
  padding: 20px;
  background: #081e55;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 20px;
}

select, button {
  width: 100%;
  padding: 15px;
  margin: 10px 0;
  font-size: 16px;
}

button {
  background: #1e5eff;
  color: white;
  border: none;
  border-radius: 8px;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
}

.student {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}

.sig {
  border: 1px solid #ccc;
  height: 60px;
}
</style>
</head>

<body>

<div class="header">NDC Studio Check-In (v3)</div>

<div class="container">

  <label>Class</label>
  <select id="className">
    <option>Silver Ballroom</option>
    <option>Gold Ballroom</option>
    <option>Private Lesson</option>
  </select>

  <label>Teacher</label>
  <input id="teacher" placeholder="Instructor name">

  <button onclick="loadClass()">Load Class</button>

  <div id="students"></div>

  <button onclick="submit()">Submit Attendance</button>

</div>

<script>

let studentsData = [];

function loadClass() {
  const container = document.getElementById("students");
  container.innerHTML = "";

  studentsData = [
    { first:"John", last:"Smith", signed:false },
    { first:"Mary", last:"Jones", signed:false }
  ];

  studentsData.forEach((s, i) => {
    container.innerHTML += `
      <div class="card">
        <div class="student">
          ${s.first} ${s.last}
        </div>

        <button onclick="toggle(${i})">
          Mark Present
        </button>

        <canvas class="sig" id="sig${i}"></canvas>
      </div>
    `;
  });
}

function toggle(i) {
  studentsData[i].signed = true;
  alert("Marked present");
}

function submit() {

  const payload = {
    className: document.getElementById("className").value,
    keyTeacher: document.getElementById("teacher").value,
    date: new Date().toISOString().split("T")[0],
    time: new Date().toLocaleTimeString(),
    students: studentsData
  };

  fetch("https://script.google.com/a/macros/ndcballroom.com/s/XXXXX/exec", {
    method: "POST",
    body: JSON.stringify(payload)
  })
  .then(r => r.json())
  .then(res => {
    alert("Saved: " + res.status);
    console.log(res);
  });

}

</script>

</body>
</html>
